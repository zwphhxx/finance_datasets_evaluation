# 错误标签体系（Label Taxonomy）
#
# 用途：集中维护模型回答错误标签的名称、定义、典型表现、影响维度与数据补强方向。
# error_labels.csv 中的 error_type 取值须来自本文件，新增错误类型时先在此登记。
# impacted_dimension 指该错误主要影响的评分标准维度，取值须为
# dataset_manifest.yml 中声明的维度名称之一。
# 校验脚本以此为准，确认错误标签均为已定义类型、影响维度合法，并可与数据补强建议对应。

version: "0.1.0"
updated: "2026-06-28"

labels:
  - name: 风险遗漏
    definition: 回答遗漏任务要求识别的关键风险点或必要核查事项。
    typical_signs: 未计算必要指标、未提示关键风险或遗漏必要程序。
    impacted_dimension: 风险覆盖
    data_direction: 补充含完整风险点的任务样本与优秀回答对照，强化风险覆盖训练。

  - name: 依据错误
    definition: 引用法规、标准或事实依据有误，或在缺乏依据的情况下给出结论。
    typical_signs: 引用条款不准确、混用适用规则或结论缺少数据支撑。
    impacted_dimension: 依据可靠性
    data_direction: 引入权威法规摘要与典型案例，建立结论到依据的对照样本。

  - name: 可执行性弱
    definition: 回答停留在概述层面，缺少可操作的核查材料、步骤或清单。
    typical_signs: 未列出需核查的合同、发票、流水等材料，或缺少操作步骤。
    impacted_dimension: 风险覆盖
    data_direction: 为每类任务提供核查清单模板与操作步骤样本。

  - name: 推理不足
    definition: 推理链条不完整，或未结合具体场景展开必要的分析过程。
    typical_signs: 直接给出结论而缺少推导，或忽略关键前提条件。
    impacted_dimension: 推理与场景适配
    data_direction: 补充含分步推理过程的优秀回答样本，强化推理与场景适配。

  - name: 场景错配
    definition: 套用与当前任务场景不匹配的规则、阈值或结论。
    typical_signs: 误用其他领域标准、忽略场景差异或错配适用条件。
    impacted_dimension: 推理与场景适配
    data_direction: 增加跨场景边界对比样本，明确不同场景的适用条件。

  - name: 表达问题
    definition: 表述不清、结构混乱或专业表达不规范，影响结论可读性。
    typical_signs: 用语含糊、缺少结构化表达或专业术语使用不当。
    impacted_dimension: 专业表达
    data_direction: 提供结构化专业表达范式样本，规范结论与依据的呈现方式。

dataset: FinDueEval-MVP
version: 1.0.0
updated: '2026-07-07'
description: 最终 13 条脱敏专业任务样本，覆盖财务场景、法律场景和投行场景；seed 文件只用于初始化，运行结果由 SQLite 在运行期产生。
assets:
  tasks:
    file: tasks.csv
    primary_key: case_id
    description: 专业尽调任务题。
  gold_answers:
    file: gold_answers.json
    primary_key: case_id
    description: 任务参考答案，定义核心结论、关键依据与答案边界。
  model_outputs:
    file: model_outputs.csv
    primary_key: output_id
    description: 模型回答记录；当前 seed 仅保留表头，真实回答在运行期产生。
  scores:
    file: scores.csv
    primary_key: output_id
    description: 模型回答的评分维度记录；当前 seed 仅保留表头，真实评分在运行期产生。
  error_labels:
    file: error_labels.csv
    primary_key: null
    description: 模型回答的错误标签，类型取值受 label_taxonomy.yml 约束。
  optimization_plan:
    file: optimization_plan.csv
    primary_key: null
    description: 由错误标签收敛出的数据补强建议。
  optimization_comparison:
    file: optimization_comparison.csv
    primary_key: experiment_id
    description: 优化前后指标对比，用于验证数据补强效果。
  preference_pairs:
    file: preference_pairs.csv
    primary_key: pair_id
    description: 回答偏好对照样本。
  evaluation_runs:
    file: evaluation_runs.csv
    primary_key: run_id
    description: 评测批次记录。
scope:
  domains:
  - Capital Markets
  - Financial
  - Legal
  task_types:
  - Financial Judgment
  - Legal Judgment
  - Investment Banking Judgment
  difficulties:
  - Easy
  - Medium
  - Hard
  models:
  - Model_A_baseline
  - Model_B_rag
  - Model_C_prompt_v2
rubric:
  total: 100
  total_field: total_score
  dimensions:
  - field: accuracy_score
    name: 专业准确性
    weight: 30
    full_mark_standard: 结论与 Gold Answer 的核心判断一致，关键财务、法律或监管要点无事实性错误， 对题目给出的数据和事实使用准确，并能识别影响结论的必要前提。
    deduction_rules: 结论方向错误、引用事实错误或忽略关键前提时扣重分；关键计算、法规适用或主体关系 存在局部错误时按影响程度扣分；只给结论但缺少必要事实支撑时扣分。
  - field: reasoning_score
    name: 推理与场景适配
    weight: 20
    full_mark_standard: 分析路径与当前任务场景匹配，能说明判断步骤、关键假设和不确定性， 推理链条完整且前后结论一致。
    deduction_rules: 推理跳跃、场景套用不当、只罗列结论不说明路径时扣分；遗漏关键假设、 前后表述矛盾或未解释边界条件时按严重程度扣分。
  - field: coverage_score
    name: 风险覆盖
    weight: 20
    full_mark_standard: 覆盖 Gold Answer 中的必须关注点，能识别主要风险、核查事项和不可接受错误边界， 对高风险事项给出清楚提示。
    deduction_rules: 漏掉必须覆盖点、未识别重大风险或未提示红线错误时扣重分；风险事项覆盖不全、 核查建议过泛或遗漏次要风险时按影响程度扣分。
  - field: evidence_score
    name: 依据可靠性
    weight: 15
    full_mark_standard: 依据来自题目材料、财务数据、法规口径或需核查文件，能区分已知事实与待核验事项， 不编造不存在的材料或结论。
    deduction_rules: 编造事实、法规、文件或数据时扣重分；依据来源含糊、未区分事实与假设、 缺少关键材料核查路径时按影响程度扣分。
  - field: expression_score
    name: 专业表达
    weight: 15
    full_mark_standard: 表达清晰、审慎、结构完整，符合财务/法律/投行业务底稿或评审意见的专业语气， 能用简洁语言呈现结论、依据和后续核查事项。
    deduction_rules: 表述武断、口语化、结构混乱或遗漏必要保留意见时扣分；冗长重复、 术语使用不当或无法支撑人工复核时按影响程度扣分。
gold_answer:
  required_fields:
  - core_conclusion
  - key_evidence
  boundary_any_of:
  - boundary_conditions
  - unacceptable_errors
boundary: 当前数据集仅包含 13 条脱敏专业任务样本，用于展示财务、法律、投行场景下模型回答质量、主要问题与使用边界；不代表脱离样本范围的泛化结论。
